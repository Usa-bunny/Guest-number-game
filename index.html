<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="style.css" />
    <title>Guess My Number!</title>
    <link rel="icon" type="image/png" sizes="32x32" href="logo.png">
  </head>
  <body>
    <div class="popup" id="popup">
      <p class="label-note">Note: <span class="note">In Development</span></p>
      <div class="popup-sub">
        <label class="custom-label" for="start">start number</label>
        <input placeholder="start" type="number" class="custom-input start-input" id="start"/>
      </div>
      <div class="popup-sub">
        <label class="custom-label" for="end">end number</label>
        <input placeholder="end" type="number" class="custom-input end-input" id="end"/>
      </div>
      <div class="popup-sub">
        <label class="custom-label" for="hearth">heart</label>
        <input placeholder="heart" type="number" class="custom-input hearth-input" id="heart"/>
      </div>
      <div class="popup-sub">
        <button class="btn-custom apply">Apply!</button>
      </div>
    </div>
    <header>
      <h1 class="title">Guess My Number!</h1>
      <div class="between">
        <button class="btn" onclick="show('popup')">Custom</button>
        <p style="margin-top: 1rem;">(Between <span class="min"></span> and <span class="max"></span>)</p>
      </div>
      <button class="btn restart">Restart!</button>
      <div class="number">?</div>
    </header>
    <main>
      <section class="left">
        <input type="number" class="guess" />
        <button class="btn check">Check!</button>
      </section>
      <section class="right">
        <p class="message">Start guessing...</p>
        <p class="label-score">💯 Score: <span class="score">20</span></p>
        <p class="label-highscore">
          🥇 Highscore: <span class="highscore">0</span>
        </p>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
